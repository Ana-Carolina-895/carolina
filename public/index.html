<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carolina Alves</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: transparent;
  --purple: #381d48;
  --pink: #f7d9e1;
}

body {
  background: url('public/bg.png') top center / cover no-repeat fixed;
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 48px 20px 40px;
}

.container {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* HEADER */
.header {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 32px;
  gap: 6px;
}

.header-logo { width: 48px; height: 48px; object-fit: contain; }

.header-name {
  font-family: 'Great Vibes', cursive;
  font-size: 52px;
  color: var(--purple);
  line-height: 1;
}

.header-tagline {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--purple);
  opacity: 0.55;
  text-transform: uppercase;
  margin-top: 2px;
}

/* CARDS WRAPPER */
.cards {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* CARD BASE — cursor padrão, sem hover de retângulo */
.card {
  width: 100%;
  cursor: default;
  display: block;
  text-decoration: none;
  position: relative;
  background: transparent;
  opacity: 0;
  transform: translateY(24px);
  transition:
    transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
    filter 0.18s ease,
    box-shadow 0.18s ease;
  -webkit-tap-highlight-color: transparent;
}

.card:nth-child(1) { animation-delay: 0.05s; }
.card:nth-child(2) { animation-delay: 0.12s; }
.card:nth-child(3) { animation-delay: 0.19s; }
.card:nth-child(4) { animation-delay: 0.26s; }
.card:nth-child(5) { animation-delay: 0.33s; }

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

/* hover REAL — só ativa via JS quando mouse está em pixel opaco */
.card.is-hover {
  cursor: pointer;
  transform: translateY(-3px) scale(1.015);
  filter: drop-shadow(0 14px 22px rgba(56,29,72,0.28));
}

/* active/click */
.card.is-active {
  transform: scale(0.97);
  filter: drop-shadow(0 3px 8px rgba(56,29,72,0.2)) brightness(0.96);
  transition:
    transform 0.08s ease,
    filter 0.08s ease;
}

/* imagem do card */
.card img {
  width: 100%;
  height: auto;
  display: block;
  pointer-events: none; /* eventos sempre no .card */
}

/* placeholder fallback */
.card-placeholder {
  width: 100%;
  padding: 28px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(120deg, #c9a8d8 0%, var(--purple) 100%);
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 1px;
  border-radius: 12px;
}

/* FOOTER */
.footer {
  margin-top: 28px;
  font-size: 10px;
  color: var(--purple);
  opacity: 0.35;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
}

@media (min-width: 768px) {
  body { background-attachment: scroll; }
}
</style>
</head>
<body>
<div class="container">

  <img src="public/hero.png" alt="Carolina Alves" style="width:100%; display:block; opacity:0; animation: cardIn 0.6s ease 0s forwards;">

  <div class="cards">

    <a href="#" class="card">
      <img src="public/card-youtube.png" alt="Meu canal no YouTube"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="card-placeholder" style="display:none;">Meu canal no YouTube</div>
    </a>

    <a href="#" class="card">
      <img src="public/card-instagram.png" alt="Me acompanhe no Instagram"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="card-placeholder" style="display:none;">Me acompanhe no Instagram</div>
    </a>

    <a href="#" class="card">
      <img src="public/card-tiktok.png" alt="Me acompanhe no TikTok"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="card-placeholder" style="display:none;">Me acompanhe no TikTok</div>
    </a>

    <a href="#" class="card">
      <img src="public/card-contato.png" alt="Parcerias e Contato"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="card-placeholder" style="display:none;">Parcerias e Contato</div>
    </a>

    <a href="#" class="card">
      <img src="public/card-recomendacoes.png" alt="Recomendações"
           onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="card-placeholder" style="display:none;">Recomendações</div>
    </a>

  </div>

  <div class="footer">© 2025 Carolina Alves</div>
</div>

<script>
const ALPHA_THRESHOLD = 10;
const alphaCache = new Map();

function buildAlphaMap(img) {
  if (alphaCache.has(img.src)) return alphaCache.get(img.src);
  try {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth;
    c.height = img.naturalHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, c.width, c.height).data;
    alphaCache.set(img.src, { data, w: c.width, h: c.height });
    return alphaCache.get(img.src);
  } catch (e) {
    // CORS bloqueou — sem amostragem, assume opaco
    alphaCache.set(img.src, null);
    return null;
  }
}

function getAlphaAt(map, rx, ry) {
  if (!map) return 255;
  const x = Math.min(map.w - 1, Math.max(0, Math.floor(rx * map.w)));
  const y = Math.min(map.h - 1, Math.max(0, Math.floor(ry * map.h)));
  return map.data[(y * map.w + x) * 4 + 3];
}

document.querySelectorAll('.card').forEach(card => {
  const img = card.querySelector('img');
  if (!img) return;

  const isOpaqueAt = (e) => {
    if (!img.complete || !img.naturalWidth) return true;
    const map = buildAlphaMap(img);
    const r = card.getBoundingClientRect();
    const rx = (e.clientX - r.left) / r.width;
    const ry = (e.clientY - r.top) / r.height;
    return getAlphaAt(map, rx, ry) >= ALPHA_THRESHOLD;
  };

  card.addEventListener('pointermove', e => {
    card.classList.toggle('is-hover', isOpaqueAt(e));
  });

  card.addEventListener('pointerleave', () => {
    card.classList.remove('is-hover', 'is-active');
  });

  card.addEventListener('pointerdown', e => {
    if (!isOpaqueAt(e)) { e.preventDefault(); return; }
    card.classList.add('is-active');
  });

  card.addEventListener('pointerup', () => card.classList.remove('is-active'));

  // bloqueia clique fora da área visível
  card.addEventListener('click', e => {
    if (!isOpaqueAt(e)) e.preventDefault();
  });
});

// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach((entry, _) => {
    if (entry.isIntersecting) {
      entry.target.style.animation = 'cardIn 0.5s ease forwards';
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.15 });

document.querySelectorAll('.card').forEach((card, i) => {
  card.style.animationDelay = (i * 0.07) + 's';
  observer.observe(card);
});
</script>
</body>
</html>
