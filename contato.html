<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato — Carolina Alves</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --purple: #381d48;
  --pink: #f7d9e1;
  --text3: #000000;
}

body {
  background: url('public/bg.png') top center / cover no-repeat fixed;
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 48px 20px 40px;
}

.container {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* HEADER */
.header {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 28px;
  gap: 6px;
  opacity: 0;
  animation: cardIn 0.4s ease 0.1s forwards;
}


.header-tagline {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--purple);
  opacity: 0.55;
  text-transform: uppercase;
  margin-top: 2px;
}

/* CONTACT CARD */
.contact-wrap {
  width: 100%;
  opacity: 0;
  transform: translateY(24px);
  animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s forwards;
}

.contact-card {
  width: 100%;
  background: rgba(247, 217, 225, 0.55);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(56, 29, 72, 0.12);
  border-radius: 20px;
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  box-shadow: 0 8px 32px rgba(56, 29, 72, 0.12);
}

.contact-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--purple);
  opacity: 0.5;
}

.contact-title {
  font-family: 'Great Vibes', cursive;
  font-size: 36px;
  color: var(--purple);
  text-align: center;
  line-height: 1.1;
}

.contact-desc {
  font-size: 11.5px;
  color: var(--text3);
  opacity: 0.9;
  letter-spacing: 0.5px;
  text-align: center;
  line-height: 1.7;
  font-weight: 300;
}

/* email row */
.email-row {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(56, 29, 72, 0.06);
  border: 1px solid rgba(56, 29, 72, 0.14);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
  -webkit-tap-highlight-color: transparent;
}

.email-row:hover {
  background: rgba(56, 29, 72, 0.1);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(56, 29, 72, 0.14);
}

.email-row:active {
  transform: scale(0.98);
  box-shadow: none;
}

.email-text {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--purple);
  letter-spacing: 0.3px;
  word-break: break-all;
  user-select: all;
}

.copy-btn {
  flex-shrink: 0;
  background: var(--purple);
  color: var(--pink);
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'Montserrat', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.12s ease;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}

.copy-btn:hover { background: #4e2866; }
.copy-btn:active { transform: scale(0.95); }
.copy-btn.copied {
  background: #6a9e6a;
  letter-spacing: 1px;
}

/* toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--purple);
  color: var(--pink);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 24px;
  border-radius: 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 100;
  box-shadow: 0 8px 24px rgba(56,29,72,0.25);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* back link */
.back-link {
  margin-top: 28px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--purple);
  opacity: 0.4;
  text-decoration: none;
  transition: opacity 0.18s ease;
  opacity: 0;
  animation: cardIn 0.5s ease 0.3s forwards;
}
.back-link:hover { opacity: 0.75; }

/* FOOTER */
.footer {
  margin-top: 28px;
  font-size: 10px;
  color: var(--purple);
  opacity: 0.35;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
  opacity: 0;
  animation: cardIn 0.5s ease 0.35s forwards;
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

@media (min-width: 768px) {
  body { background-attachment: scroll; }
}

/* butterfly */
#butterfly-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bfly {
  position: absolute;
  opacity: 0;
  will-change: transform, opacity;
  top: 0; left: 0;
}
.wing-l, .wing-r {
  transform-origin: center;
  animation: flap 0.45s ease-in-out infinite alternate;
}
.wing-r { animation-direction: alternate-reverse; }
@keyframes flap {
  from { transform: scaleX(1); }
  to   { transform: scaleX(0.2); }
}
</style>
</head>
<body>
<div id="butterfly-layer"></div>

<div class="container">
  <img src="public/hero.png" alt="Carolina Alves" style="width:100%; display:block; opacity:0; animation: cardIn 0.6s ease 0s forwards;">
  <div class="header">
    <div class="header-tagline">Contato &amp; Parceria</div>
  </div>

  <div class="contact-wrap">
    <div class="contact-card">
      <span class="contact-label">E-mail</span>
      <div class="contact-title">Vamos conversar?</div>
      <p class="contact-desc">Para colaborações, parcerias e propostas comerciais,<br>entre em contato pelo e-mail abaixo.</p>

      <div class="email-row" id="emailRow" title="Clique para copiar">
        <span class="email-text" id="emailText">projetoide.missoes2005@gmail.com</span>
        <button class="copy-btn" id="copyBtn" aria-label="Copiar e-mail">Copiar</button>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-link">← Voltar</a>
  <div class="footer">© 2025 Carolina Alves</div>
</div>

<div class="toast" id="toast">E-mail copiado!</div>

<script>
const EMAIL = 'projetoide.missoes2005@gmail.com';
const copyBtn = document.getElementById('copyBtn');
const emailRow = document.getElementById('emailRow');
const toast = document.getElementById('toast');
let toastTimer;

function copyEmail(e) {
  e.stopPropagation();
  navigator.clipboard.writeText(EMAIL).then(() => {
    copyBtn.textContent = 'Copiado!';
    copyBtn.classList.add('copied');
    showToast();
    setTimeout(() => {
      copyBtn.textContent = 'Copiar';
      copyBtn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = EMAIL;
    ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
}

function showToast() {
  clearTimeout(toastTimer);
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

copyBtn.addEventListener('click', copyEmail);
emailRow.addEventListener('click', copyEmail);
</script>

<script>
const bflyLayer = document.getElementById('butterfly-layer');
const COLORS = ['#c084e0','#a855c8','#e8b4f0','#7c3aad','#d8a0e8'];

function makeBfly() {
  const el = document.createElement('div');
  el.className = 'bfly';
  const size = 18 + Math.random() * 24;
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  el.innerHTML = '<svg width="' + size + '" height="' + (size*0.75) + '" viewBox="0 0 40 30">'
    + '<g class="wing-l"><ellipse cx="10" cy="12" rx="10" ry="8" fill="' + color + '" opacity="0.7"/>'
    + '<ellipse cx="8" cy="22" rx="7" ry="5" fill="' + color + '" opacity="0.5"/></g>'
    + '<g class="wing-r"><ellipse cx="30" cy="12" rx="10" ry="8" fill="' + color + '" opacity="0.7"/>'
    + '<ellipse cx="32" cy="22" rx="7" ry="5" fill="' + color + '" opacity="0.5"/></g>'
    + '<ellipse cx="20" cy="15" rx="2" ry="7" fill="#381d48" opacity="0.6"/></svg>';
  bflyLayer.appendChild(el);
  return el;
}

function launchBfly(el, onDone) {
  const startX = Math.random() * 110 - 5;
  const startY = 30 + Math.random() * 70;
  const endX = startX + (Math.random() - 0.5) * 40;
  const endY = startY - 30 - Math.random() * 40;
  const duration = 4000 + Math.random() * 4000;
  const cp1x = startX + (Math.random() - 0.5) * 30;
  const cp1y = startY - Math.random() * 20;
  const cp2x = endX + (Math.random() - 0.5) * 30;
  const cp2y = endY + Math.random() * 20;
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const e2 = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    const mt = 1 - e2;
    const x = mt*mt*mt*startX + 3*mt*mt*e2*cp1x + 3*mt*e2*e2*cp2x + e2*e2*e2*endX;
    const y = mt*mt*mt*startY + 3*mt*mt*e2*cp1y + 3*mt*e2*e2*cp2y + e2*e2*e2*endY;
    const opacity = t < 0.15 ? t/0.15 : t > 0.75 ? (1-t)/0.25 : 1;
    el.style.opacity = opacity * 0.75;
    el.style.transform = 'translate(' + x + 'vw,' + y + 'vh)';
    if (t < 1) requestAnimationFrame(step);
    else if (onDone) onDone();
  }
  requestAnimationFrame(step);
}

const pool = [];
for (let i = 0; i < 6; i++) pool.push(makeBfly());

let scrollTimer = null, isScrolling = false, activeCount = 0;
const MAX_ACTIVE = 5;

function launchOne() {
  if (!isScrolling || activeCount >= MAX_ACTIVE) return;
  const el = pool[Math.floor(Math.random() * pool.length)];
  activeCount++;
  launchBfly(el, () => {
    activeCount--;
    if (isScrolling) setTimeout(launchOne, 200 + Math.random() * 400);
  });
}

window.addEventListener('scroll', () => {
  if (!isScrolling) {
    isScrolling = true;
    launchOne();
    if (activeCount < MAX_ACTIVE) setTimeout(launchOne, 300);
    if (activeCount < MAX_ACTIVE) setTimeout(launchOne, 600);
  }
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => { isScrolling = false; }, 200);
}, { passive: true });
</script>
</body>
</html>
